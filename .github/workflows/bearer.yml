# .github/workflows/bearer.yml
jobs:
  bearer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Report
        id: report
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc
        with:
          api-key: ${{ secrets.BEARER_TOKEN }}
          format: sarif
          output: results.sarif
          exit-code: 0

      # Ensure SARIF has runs[0].results as an array (required by SARIF schema / uploader)
      - name: Normalize SARIF (ensure runs[0].results is an array)
        run: |
          set -euo pipefail
          echo "=== First 200 lines of results.sarif ==="
          sed -n '1,200p' results.sarif || true

          python - <<'PY'
          import json
          p="results.sarif"
          with open(p,"r",encoding="utf-8") as f:
            data=json.load(f)

          # Ensure structure exists
          runs = data.get("runs")
          if not isinstance(runs, list) or len(runs) == 0:
            raise SystemExit("Invalid SARIF: missing runs[]")

          run0 = runs[0]
          # Fix missing or non-array results
          results = run0.get("results", [])
          if not isinstance(results, list):
            run0["results"] = []
          else:
            run0["results"] = results

          with open(p,"w",encoding="utf-8") as f:
            json.dump(data,f)
          print("Normalized results.sarif: ensured runs[0].results is an array")
          PY

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

          